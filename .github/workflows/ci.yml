name: CI

on:
  pull_request:
    branches:
      - master
      - feature

jobs:
  build:
    name: Build Project
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Install project with dependencies
        run: pip install -e .

      - name: Build package
        run: python -m build

  code-quality:
    name: Code Quality Checks
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint black
          pip install -e .

      - name: Check code formatting with Black
        run: black --check src/

      - name: Lint code with Pylint
        run: pylint --fail-under=9.0 src/
