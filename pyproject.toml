[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "genet_py"
version = "0.1.0"
description = "GENET Python library"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "geopack",
    "numpy",
    "pandas",
    "platformdirs",
    "scipy",
    "swvo",
]

[project.urls]
Homepage = "https://github.com/DmitriiGurev/genet-py"
Repository = "https://github.com/DmitriiGurev/genet-py"
Issues = "https://github.com/DmitriiGurev/genet-py/issues"

[tool.setuptools.packages.find]
where = ["src"]